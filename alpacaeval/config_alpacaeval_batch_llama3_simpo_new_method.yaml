base_config: config_alpacaeval.yaml
run_inference: true
run_evaluation: false
skip_existing: true
continue_on_error: false
use_model_configs: false

overrides:
  alpacaeval:
    simpo_compat: false

models:
  - model_name_or_path: princeton-nlp/Llama-3-Base-8B-SFT-SimPO
    pretty_name: Llama-3-Base-8B-SFT-SimPO
    overrides:
      alpacaeval:
        tokenizer_name_or_path: meta-llama/Meta-Llama-3-8B
        simpo_compat: true
        prompt_template: templates/llama3.txt
        generation:
          batch_size: 900

  - model_name_or_path: W-61/llama3-8b-base-new-method-q_t-0.4-s_star0.6
    pretty_name: llama3-8b-base-new-method-q_t-0.4-s_star0.6
    overrides:
      alpacaeval:
        prompt_template: templates/ultrafeedback-llama3-8b-beta-dpo.txt
