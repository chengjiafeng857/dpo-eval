base_config: config_alpacaeval.yaml
run_inference: true
run_evaluation: true
skip_existing: true
continue_on_error: false
use_model_configs: false

overrides:
  alpacaeval:
    simpo_compat: false

models:
  - model_name_or_path: W-61/llama-3-8b-base-sft-ultrachat-8xh200
    pretty_name: llama-3-8b-base-sft-ultrachat-8xh200
    overrides:
      alpacaeval:
        prompt_template: templates/ultrachat-llama-3-8b-sft.txt

  - model_name_or_path: W-61/llama-3-8b-base-beta-dpo-ultrafeedback-8xh200
    pretty_name: llama-3-8b-base-beta-dpo-ultrafeedback-8xh200
    overrides:
      alpacaeval:
        prompt_template: templates/ultrafeedback-llama3-8b-beta-dpo.txt

  - model_name_or_path: W-61/llama-3-8b-base-margin-dpo-ultrafeedback-8xh200
    pretty_name: llama-3-8b-base-margin-dpo-ultrafeedback-8xh200
    overrides:
      alpacaeval:
        prompt_template: templates/ultrafeedback-llama3-8b-margin-dpo.txt

  - model_name_or_path: W-61/llama-3-8b-base-epsilon-dpo-ultrafeedback-8xh200
    pretty_name: llama-3-8b-base-epsilon-dpo-ultrafeedback-8xh200
    overrides:
      alpacaeval:
        prompt_template: templates/Llama3-8b-ultrafeedback-binarized-e-dpo.txt
