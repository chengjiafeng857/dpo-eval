policy_name: jackf857/llama-3-8b-base-cpo-ultrafeedback-8xh200
precision: bf16

mtbench:
  pretty_name: llama-3-8b-base-cpo-ultrafeedback-8xh200
  model_name_or_path: jackf857/llama-3-8b-base-cpo-ultrafeedback-8xh200
  backend: vllm
  use_custom_chat_template: true
  prompt_template: templates/ultrafeedback-llama3-8b-margin-dpo.jinja
  output_dir: ../outputs/mtbench/llama-3-8b-base-cpo-ultrafeedback-8xh200
  question_file: questions.jsonl
  reference_answer_file: reference_answer/gpt-4-turbo.jsonl
  judge_model: gpt-4-turbo
  judge_models:
    - gpt-4-turbo
  judge_command:
    - python
    - -m
    - fastchat.llm_judge.gen_judgment
    - --answer-file
    - "{answer_file}"
    - --question-file
    - "{question_file}"
    - --reference-answer-file
    - "{reference_answer_file}"
    - --output-path
    - "{judgment_file}"
    - --model-list
    - "{pretty_name}"
  show_result_command:
    - python
    - -m
    - fastchat.llm_judge.show_result
    - --input-file
    - "{judgment_file}"
    - --model-list
    - "{pretty_name}"
  generation:
    batch_size: 128
    do_sample: false
    max_new_tokens: 1024
    stop_token_ids:
      - 128001
      - 128009
    temperature: 0.0
    top_p: 1.0
  vllm:
    tensor_parallel_size: 1
    trust_remote_code: false
    gpu_memory_utilization: 0.9
  transformers:
    device: cuda
    trust_remote_code: false
