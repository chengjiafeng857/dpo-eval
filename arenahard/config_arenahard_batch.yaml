base_config: config_arenahard.yaml
run_inference: true
run_evaluation: true
skip_existing: true
continue_on_error: false

models:
  - pretty_name: local-model
    model_endpoint:
      model: local-model
      endpoints:
        - api_base: http://0.0.0.0:8000/v1
          api_key: "-"
      api_type: openai
      parallel: 128
      max_tokens: 8192
      temperature: 0.0
