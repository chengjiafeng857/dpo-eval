base_config: config_arenahard_v2.yaml
run_inference: true
run_judging: true
skip_existing: true
continue_on_error: false

overrides:
  arenahard_v2:
    bench_name: arena-hard-v2.0
    benchmark_dir: ../outputs/arenahard_v2
    mode: local
    backend: vllm
    endpoint_file: api_config.yaml
    judge_model: gemini-2.5-flash
    judge_endpoint_name: gemini-2.5-flash
    judge_parallel: 1
    judge_temperature: 1.0
    judge_max_tokens: 32000
    judge_max_retries: 8
    judge_initial_backoff: 5
    judge_max_backoff: 60
    bootstrap_rounds: 100

models:
  - model_name_or_path: W-61/llama-3-8b-base-sft-ultrachat-8xh200
    pretty_name: sft
    overrides:
      arenahard_v2:
        prompt_template: ../mtbench/templates/ultrachat-llama-3-8b-sft.jinja

  - model_name_or_path: W-61/llama-3-8b-base-margin-dpo-ultrafeedback-8xh200
    pretty_name: dpo
    overrides:
      arenahard_v2:
        prompt_template: ../mtbench/templates/ultrafeedback-llama3-8b-margin-dpo.jinja

  - model_name_or_path: W-61/llama-3-8b-base-beta-dpo-ultrafeedback-8xh200
    pretty_name: beta-dpo
    overrides:
      arenahard_v2:
        prompt_template: ../mtbench/templates/ultrafeedback-llama3-8b-beta-dpo.jinja

  - model_name_or_path: W-61/llama-3-8b-base-epsilon-dpo-ultrafeedback-8xh200
    pretty_name: e-dpo
    overrides:
      arenahard_v2:
        prompt_template: ../mtbench/templates/Llama3-8b-ultrafeedback-binarized-e-dpo.jinja
