inputs:
  chosen: "outputs/gpt_judge_HH/harmless_base/multi_turn/chosen_output_hh.json"
  margin_dpo: "outputs/gpt_judge_HH/harmless_base/multi_turn/llama-3-8b-base-margin-dpo-hh-harmless-batch-size-64-multi.json"

judge:
  backend: armorm
  model: "RLHFlow/ArmoRM-Llama3-8B-v0.1"
  candidate_keys: ["chosen", "margin_dpo"]
  prompt_field: "instruction"
  precision: "bf16"
  device_map: "auto"
  max_length: 4096
  trust_remote_code: true
  truncation: true
  tie_epsilon: 0.0

output:
  results_file: "outputs/RMjudge/armorm/harmless_base/multi_turn/chosen_vs_margin_dpo.jsonl"
  summary_file: "outputs/RMjudge/armorm/harmless_base/multi_turn/chosen_vs_margin_dpo_summary.json"
