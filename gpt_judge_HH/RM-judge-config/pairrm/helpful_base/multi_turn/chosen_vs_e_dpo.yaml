inputs:
  chosen: "outputs/gpt_judge_HH/helpful_base/chosen_output_hh.json"
  e_dpo: "outputs/gpt_judge_HH/helpful_base/multi_turn/llama-3-8b-base-epsilon-dpo-hh-helpful-4xh200-batch-64-20260418-001920-multi.json"

judge:
  backend: pairrm
  model: "llm-blender/PairRM"
  candidate_keys: ["chosen", "e_dpo"]
  batch_size: 8
  prompt_field: "instruction"
  tie_epsilon: 0.0

output:
  results_file: "outputs/RMjudge/pairrm/helpful_base/multi_turn/chosen_vs_e_dpo.jsonl"
  summary_file: "outputs/RMjudge/pairrm/helpful_base/multi_turn/chosen_vs_e_dpo_summary.json"
