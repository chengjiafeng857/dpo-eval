inputs:
  chosen: "outputs/RMjudge/pairrm/helpful_base/multi_turn/chosen_output_hh.json"
  margin_dpo: "outputs/RMjudge/pairrm/helpful_base/multi_turn/llama-3-8b-base-margin-dpo-hh-helpful-batch-64-multi/llama-3-8b-base-margin-dpo-hh-helpful-batch-64-multi.json"

judge:
  backend: pairrm
  model: "llm-blender/PairRM"
  candidate_keys: ["chosen", "margin_dpo"]
  batch_size: 8
  prompt_field: "instruction"
  tie_epsilon: 0.0

output:
  results_file: "outputs/RMjudge/pairrm/helpful_base/multi_turn/llama-3-8b-base-margin-dpo-hh-helpful-batch-64-multi/chosen_vs_margin_dpo.jsonl"
  summary_file: "outputs/RMjudge/pairrm/helpful_base/multi_turn/llama-3-8b-base-margin-dpo-hh-helpful-batch-64-multi/chosen_vs_margin_dpo_summary.json"
