dataset:
  repo_id: "Anthropic/hh-rlhf"
  data_dir: "helpful-base"
  split: "test"
  single_turn_only: true
  max_instances: null

models:
  sft: "/scratch/$USER/dynamic-dpo-v4/outputs/qwen3-8b-base-sft-hh-helpful-4xh200-batch-64-20260417-214452"

generation:
  model_key: "sft"
  output_key: "sft"
  backend: "vllm"
  use_custom_chat_template: false
  prompt_template: "templates/llama3.txt"
  max_new_tokens: 128
  batch_size: 8
  stop_token_ids:
    - 151645
  device: "cuda"
  temperature: 0.7
  top_p: 0.9
  max_input_tokens: 2048
  apply_chat_template: true
  seed: 42
  extract_chosen: false
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.9
  trust_remote_code: false

inputs:
  sft: "outputs/gpt_judge_HH/helpful_base/single_turn/qwen3-8b-base-sft-hh-helpful-4xh200-batch-64-20260417-214452-single/qwen3-8b-base-sft-hh-helpful-4xh200-batch-64-20260417-214452-single.json"
  chosen: "outputs/gpt_judge_HH/helpful_base/single_turn/chosen_output_hh_single.json"

gpt4_oracle:
  model: "gpt-4.1"
  max_tokens: 256
  seed: 42
  max_retries: 5
  initial_backoff: 1.0
  max_backoff: 60.0
  system_prompt: 
  prompt_template_pairwise: |
    For the following query to a chatbot, which response is more helpful?

    Query: {instruction}

    Response A:
    {output_a}

    Response B:
    {output_b}

    FIRST provide a one-sentence comparison of the two responses and explain \
    which you feel is more helpful. SECOND, on a new line, state only "A" or \
    "B" to indicate which response is more helpful. Your response should use \
    the format:
    Comparison: <one-sentence comparison and explanation>
    More helpful: <"A" or "B">

output:
  results_file: "outputs/gpt_judge_HH/helpful_base/single_turn/qwen3-8b-base-sft-hh-helpful-4xh200-batch-64-20260417-214452-single/gpt-4.1/chosen_vs_qwen3-8b-base-sft-hh-helpful-4xh200-batch-64-20260417-214452.jsonl"
  summary_file: "outputs/gpt_judge_HH/helpful_base/single_turn/qwen3-8b-base-sft-hh-helpful-4xh200-batch-64-20260417-214452-single/gpt-4.1/chosen_vs_qwen3-8b-base-sft-hh-helpful-4xh200-batch-64-20260417-214452_summary.json"

judge:
  candidate_keys:
    - "chosen"
    - "sft"
